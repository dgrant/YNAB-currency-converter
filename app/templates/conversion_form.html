{% extends "base.html" %}
{% block content %}
<div class="card narrow">
  <h1>{{ "Edit conversion" if conversion else "New conversion" }}</h1>
  <form method="post"
        action="{{ '/conversions/' + conversion.id + '/edit' if conversion else '/conversions' }}"
        id="conversion-form">
    {{ csrf_input(request) }}
    <label for="budget">Plan</label>
    <select id="budget" name="budget_id" required></select>

    <label for="account">Account (transactions entered in foreign currency)</label>
    <select id="account" name="account_id" required></select>

    <label for="from_currency">Original currency of the transactions</label>
    <select id="from_currency" name="from_currency" required>
      {% for code, name in currencies.items() %}
      <option value="{{ code }}">{{ code }} — {{ name }}</option>
      {% endfor %}
    </select>

    <label for="to_currency">Convert to (plan currency)</label>
    <select id="to_currency" name="to_currency" required>
      {% for code, name in currencies.items() %}
      <option value="{{ code }}">{{ code }} — {{ name }}</option>
      {% endfor %}
    </select>

    <label for="start_date">Start date (earliest unconverted transaction)</label>
    <input type="date" id="start_date" name="start_date"
           value="{{ conversion.start_date if conversion else today }}" required>

    <input type="hidden" name="budget_name" id="budget_name">
    <input type="hidden" name="account_name" id="account_name">
    <button type="submit" class="primary">
      {{ "Save changes" if conversion else "Create conversion" }}
    </button>
    {% if conversion %}
    <a href="/conversions/{{ conversion.id }}">Cancel</a>
    {% endif %}
  </form>
</div>

<script>
  const budgets = {{ budgets | tojson }};
  const conversion = {{ conversion | tojson }};
  const usedAccountIds = new Set({{ used_account_ids | tojson }});
  const budgetSelect = document.getElementById("budget");
  const accountSelect = document.getElementById("account");
  const fromCurrency = document.getElementById("from_currency");
  const toCurrency = document.getElementById("to_currency");

  for (const b of budgets) {
    budgetSelect.add(new Option(b.name, b.id));
  }

  function refreshAccounts() {
    const budget = budgets.find(b => b.id === budgetSelect.value);
    accountSelect.innerHTML = "";
    for (const a of (budget ? budget.accounts : [])) {
      const option = new Option(a.name, a.id);
      if (usedAccountIds.has(a.id)) {
        option.disabled = true;
        option.text += " — already has a conversion";
      }
      accountSelect.add(option);
    }
    // don't leave a disabled option preselected
    if (accountSelect.selectedOptions[0]?.disabled) {
      const firstEnabled = [...accountSelect.options].find(o => !o.disabled);
      accountSelect.value = firstEnabled ? firstEnabled.value : "";
    }
    if (budget && budget.currency) {
      toCurrency.value = budget.currency;
    }
    guessFromCurrency();
  }

  budgetSelect.addEventListener("change", refreshAccounts);

  // Smart default: if the account name contains a currency code ("Chequing
  // USD"), preselect it as the original currency. Never overrides a currency
  // the user picked by hand. On edit, the initial load shows the saved
  // currency untouched; the guess only fires once the account is switched.
  let fromCurrencyTouched = false;
  let initializing = !!conversion;
  fromCurrency.addEventListener("change", () => { fromCurrencyTouched = true; });
  const currencyCodes = new Set([...fromCurrency.options].map(o => o.value));

  function guessFromCurrency() {
    if (initializing || fromCurrencyTouched) return;
    const accountName = accountSelect.selectedOptions[0]?.text || "";
    const code = accountName.toUpperCase().split(/[^A-Z]+/).find(w => currencyCodes.has(w));
    if (code) fromCurrency.value = code;
  }

  accountSelect.addEventListener("change", guessFromCurrency);

  if (conversion) {
    budgetSelect.value = conversion.budget_id;
  }
  refreshAccounts();
  if (conversion) {
    accountSelect.value = conversion.account_id;
    fromCurrency.value = conversion.from_currency;
    toCurrency.value = conversion.to_currency;
    initializing = false;
  }

  document.getElementById("conversion-form").addEventListener("submit", () => {
    document.getElementById("budget_name").value =
      budgetSelect.selectedOptions[0]?.text || "";
    document.getElementById("account_name").value =
      accountSelect.selectedOptions[0]?.text || "";
  });
</script>
{% endblock %}
