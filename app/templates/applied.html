{% extends "base.html" %}
{% block content %}
<div class="card narrow">
  <h1>Done</h1>
  <p>{{ count }} transaction{{ "s" if count != 1 }} updated in YNAB
     for <strong>{{ conversion.account_name }}</strong>.</p>
  <p>
    <a class="button" href="/conversions/{{ conversion.id }}">Back to conversion</a>
    <a class="button" href="/conversions">All conversions</a>
  </p>
</div>
{% endblock %}
