{% extends "base.html" %}
{% block title %}Sign up — Currency Converter for YNAB{% endblock %}
{% block content %}
<div class="card narrow">
  <h1>Sign up</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/signup">
    {{ csrf_input(request) }}
    <label for="email">Email</label>
    <input type="email" id="email" name="email" value="{{ email }}" autofocus required>
    <label for="password">Password (at least 8 characters)</label>
    <input type="password" id="password" name="password" minlength="8" required>
    <label for="password_confirm">Confirm password</label>
    <input type="password" id="password_confirm" name="password_confirm" minlength="8" required>
    <button type="submit" class="primary">Create account</button>
  </form>
  <script>
    const password = document.getElementById("password");
    const confirmInput = document.getElementById("password_confirm");
    function checkMatch() {
      confirmInput.setCustomValidity(
        confirmInput.value && confirmInput.value !== password.value
          ? "Passwords do not match." : ""
      );
    }
    password.addEventListener("input", checkMatch);
    confirmInput.addEventListener("input", checkMatch);
  </script>
  <p class="hint">Already have an account? <a href="/login">Log in</a>.</p>
</div>
{% endblock %}
