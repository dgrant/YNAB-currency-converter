<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}YNAB Currency Converter{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <nav>
      <a class="brand" href="/conversions">YNAB Currency Converter</a>
      {% if request.session.get("authed") %}
      <form method="post" action="/logout">
        {{ csrf_input(request) }}
        <button type="submit" class="link">Log out</button>
      </form>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <span class="hint">version {{ app_version()[:12] }}</span>
  </footer>
</body>
</html>
