[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's dependency-injection idiom: Depends()/Form() in parameter defaults.
extend-immutable-calls = ["fastapi.Depends", "fastapi.Form"]

[tool.mypy]
python_version = "3.12"
files = ["app"]
check_untyped_defs = true
warn_unused_ignores = true
